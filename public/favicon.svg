<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Círculo base con fondo oscuro -->
  <circle cx="16" cy="16" r="16" fill="#1a2744"/>

  <!-- Franjas de la bandera venezolana en círculo -->
  <clipPath id="flag-clip">
    <circle cx="16" cy="16" r="13"/>
  </clipPath>
  <g clip-path="url(#flag-clip)">
    <rect x="3" y="3"  width="26" height="9"  fill="#CF0A2C"/>
    <rect x="3" y="12" width="26" height="8"  fill="#002F7F"/>
    <rect x="3" y="20" width="26" height="9"  fill="#FFCC00"/>
  </g>

  <!-- Borde dorado -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#D4A017" stroke-width="1.5"/>

  <!-- RV centrado -->
  <text x="16" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="10" fill="white" letter-spacing="-0.3">RV</text>
</svg>
